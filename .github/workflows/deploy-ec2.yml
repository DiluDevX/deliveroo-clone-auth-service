name: Deploy To EC2

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'release' && github.event.release.target_commitish == 'main' && 'production' || github.ref_name == 'main' && 'production' || 'development' }}
    env:
      APP_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      ENVIRONMENT: ${{ github.event_name == 'release' && github.event.release.target_commitish == 'main' && 'production' || github.ref_name == 'main' && 'production' || 'development' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      SECRET: ${{ vars.SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure npm to ignore engine warnings
        run: echo "engine-strict=false" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            ENV=${{ env.ENVIRONMENT }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.APP_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest-${{ env.ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and run on EC2
        uses: appleboy/ssh-action@8743aa11bfbda97acb45c151ae7a2e0b203f1914
        id: deploy
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,APP_VERSION,SECRET,AWS_REGION
          script: |
            set -eu
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Fetch secrets and write to a persistent .env file
            aws secretsmanager get-secret-value \
              --secret-id "$SECRET" \
              --region "$AWS_REGION" \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\$(.key)=\$(.value|@json)"' > /home/ec2-user/app.env
            chmod 600 /home/ec2-user/app.env
            # Ensure secrets file is cleaned up after the script finishes
            trap 'rm -f /home/ec2-user/app.env' EXIT

            docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION"

            # Run migrations before swapping the container
            docker run --rm \
              --env-file /home/ec2-user/app.env \
              "$ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION" \
              npx prisma migrate deploy

            # Stop old container BEFORE starting new one to free port 80 (keep container for rollback)
            OLD_CONTAINER_ID=$(docker ps -q -f name="^app$" 2>/dev/null || echo "")
            if [ -n "$OLD_CONTAINER_ID" ]; then
              echo "Stopping old container: $OLD_CONTAINER_ID"
              docker stop "$OLD_CONTAINER_ID" >/dev/null 2>&1 || true
            fi

            # Start new container with error handling
            set +e
            NEW_CONTAINER_ID=$(docker run -d \
              --name "app-new" \
              --restart unless-stopped \
              -p 80:3000 \
              --env-file /home/ec2-user/app.env \
              "$ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION" 2>&1)
            DOCKER_RUN_STATUS=$?
            set -e

            if [ $DOCKER_RUN_STATUS -ne 0 ]; then
              echo "✗ Failed to start new container: $NEW_CONTAINER_ID"
              # Cleanup any partial container
              docker rm -f "app-new" 2>/dev/null || true
              # Restart old container if it exists
              if [ -n "$OLD_CONTAINER_ID" ]; then
                echo "Restarting old container: $OLD_CONTAINER_ID"
                docker start "$OLD_CONTAINER_ID" || true
              fi
              exit 1
            fi

            echo "New container ID: $NEW_CONTAINER_ID"

            # Health check: wait for container to be healthy (max 30 seconds)
            HEALTH_CHECK_INTERVAL=2
            HEALTH_CHECK_TIMEOUT=30
            ELAPSED=0

            while [ $ELAPSED -lt $HEALTH_CHECK_TIMEOUT ]; do
              # Health check from host (container exposes port 80)
              if curl -sf http://localhost:80/ >/dev/null 2>&1; then
                echo "✓ Health check passed!"

                # Remove old container with production name if it exists
                docker rm -f "app" 2>/dev/null || true
                # Rename new container to production name
                docker rename "app-new" "app"
                echo "✓ Deployment successful!"
                exit 0
              fi

              echo "Health check failed, retrying in ${HEALTH_CHECK_INTERVAL}s... ($ELAPSED/${HEALTH_CHECK_TIMEOUT}s)"
              sleep $HEALTH_CHECK_INTERVAL
              ELAPSED=$((ELAPSED + HEALTH_CHECK_INTERVAL))
            done

            # Health check timeout - rollback to old container
            echo "✗ Health check failed after ${HEALTH_CHECK_TIMEOUT}s. Rolling back..."
            docker rm -f "$NEW_CONTAINER_ID" || true

            if [ -n "$OLD_CONTAINER_ID" ]; then
              echo "Restarting old container: $OLD_CONTAINER_ID"
              docker start "$OLD_CONTAINER_ID" || true
            fi
            exit 1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          APP_VERSION: ${{ env.APP_VERSION }}
          SECRET: ${{ env.SECRET }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Notify deployment failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "❌ Deployment failed and rolled back to previous version"
          exit 1
