name: Deploy To EC2

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    env:
      APP_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'development' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      SECRET: ${{ secrets.SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            ENV=${{ env.ENVIRONMENT }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.APP_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and run on EC2
        uses: appleboy/ssh-action@v1.2.5
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          APP_VERSION: ${{ env.APP_VERSION }}
          SECRET: ${{ env.SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

             # Fetch secrets and write to a temp .env file
            aws secretsmanager get-secret-value \
              --secret-id $SECRET \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > /tmp/app.env

            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION
            docker stop app || true
            docker rm app || true

            docker run -d --name app --restart unless-stopped \
              -p 80:3000 \
              --env-file /tmp/app.env \
              $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION

            # Clean up
            rm -f /tmp/app.env
