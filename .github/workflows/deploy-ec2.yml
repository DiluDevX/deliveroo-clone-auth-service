name: Deploy To EC2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    # beta tags => development, stable tags => production
    environment:
      name: ${{ contains(github.ref_name, '-beta.') && 'development' || 'production' }}

    env:
      APP_VERSION: ${{ github.ref_name }}
      ENVIRONMENT: ${{ contains(github.ref_name, '-beta.') && 'development' || 'production' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      SECRET: ${{ vars.SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure npm to ignore engine warnings
        run: echo "engine-strict=false" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            ENV=${{ env.ENVIRONMENT }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.APP_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # TODO check what is cache-from and cache-to is

      - name: Pull and run on EC2
        uses: appleboy/ssh-action@8743aa11bfbda97acb45c151ae7a2e0b203f1914
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,APP_VERSION,SECRET,AWS_REGION
          script: |
            set -eu
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Fetch secrets and write to a persistent .env file
            aws secretsmanager get-secret-value \
              --secret-id "$SECRET" \
              --region "$AWS_REGION" \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\$(.key)=\$(.value|@json)"' > /home/ec2-user/app.env
            chmod 600 /home/ec2-user/app.env
            # Ensure secrets file is cleaned up after the script finishes
            trap 'rm -f /home/ec2-user/app.env' EXIT

            docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION"

            exit 0
