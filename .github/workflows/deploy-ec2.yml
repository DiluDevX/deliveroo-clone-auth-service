name: Deploy To EC2

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 1.0.0 or 1.0.0-beta.1)'
        required: true
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  actions: read # needed to read workflow_run artifacts/metadata

concurrency:
  group: deploy-ec2-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (contains(github.event.workflow_run.head_branch, 'beta') && 'development' || 'production') }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Deploy Inputs
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      environment: ${{ steps.resolve.outputs.environment }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Resolve version and environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            ENVIRONMENT="${{ inputs.environment }}"
          else
            # Get the latest tag created by the release workflow
            VERSION=$(git describe --tags --abbrev=0)
            VERSION="${VERSION#v}"   # strip leading "v" → 1.0.0 or 1.0.0-beta.1

            if [[ "$VERSION" == *"-beta."* ]]; then
              ENVIRONMENT="development"
            else
              ENVIRONMENT="production"
            fi
          fi

          # Validate version tag exists
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION does not exist"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "should_deploy=true" >> $GITHUB_OUTPUT

          echo "✅ Version: $VERSION"
          echo "✅ Environment: $ENVIRONMENT"

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'

    environment:
      name: ${{ needs.prepare.outputs.environment }}

    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
      ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      SECRET: ${{ vars.SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }} # checkout exact tag

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
            ENV=${{ env.ENVIRONMENT }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.APP_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and run on EC2
        uses: appleboy/ssh-action@8743aa11bfbda97acb45c151ae7a2e0b203f1914
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,APP_VERSION,SECRET,AWS_REGION
          script: |
            set -eu
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            aws secretsmanager get-secret-value \
              --secret-id "$SECRET" \
              --region "$AWS_REGION" \
              --query SecretString \
              --output text | jq -r 'to_entries | .[] | "\(.key)=\(.value|@json)"' > /home/ec2-user/app.env
            chmod 600 /home/ec2-user/app.env
            trap 'rm -f /home/ec2-user/app.env' EXIT

            docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION"

            exit 0
